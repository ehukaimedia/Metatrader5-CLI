name: Publish to PyPI

# Publishes to PyPI on each GitHub Release via PyPI Trusted Publishing (OIDC) —
# no API token is stored anywhere. One-time setup on PyPI (pypi.org → your
# account → Publishing → Add a pending publisher):
#   PyPI Project Name : metatrader5-cli
#   Owner             : ehukaimedia
#   Repository name   : Metatrader5-CLI
#   Workflow name     : publish.yml
#   Environment name  : (leave blank)
# Trigger by publishing a Release, or manually via the "Run workflow" button.
# Hardening (optional, later): add a protected GitHub Environment and set the
# same name in both the PyPI publisher config and an `environment:` key below.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    # The package is pure-Python (py3-none-any), so it builds on Linux even
    # though its MetaTrader5 runtime dependency is Windows-only.
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
