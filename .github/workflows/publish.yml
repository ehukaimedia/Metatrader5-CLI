name: Publish to PyPI

# Publishes to PyPI on each GitHub Release via PyPI Trusted Publishing (OIDC) —
# no API token is stored anywhere.
#
# One-time setup (do all three):
#  1. PyPI (pypi.org -> your account -> Publishing -> Add a pending publisher):
#       PyPI Project Name : metatrader5-cli
#       Owner             : ehukaimedia
#       Repository name   : Metatrader5-CLI
#       Workflow name     : publish.yml
#       Environment name  : pypi
#  2. GitHub (Settings -> Environments -> New environment -> "pypi"):
#       - Deployment branches and tags: restrict to `master` and tag `v*`
#       - (recommended) Required reviewers: at least one maintainer
#  3. Trigger by publishing a Release, or "Run workflow" from the master branch.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    # Only a published release (a tag) or a manual run from master may reach the
    # OIDC publish step — a workflow_dispatch from any other branch is skipped,
    # and the protected `pypi` environment further restricts deployable refs.
    if: github.event_name == 'release' || github.ref == 'refs/heads/master'
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
