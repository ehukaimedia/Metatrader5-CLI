<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MT5 CLI · Codebase Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0c10;color:#d1d5db;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}
#topbar{background:#111318;border-bottom:1px solid #1f2937;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#topbar h1{font-size:15px;font-weight:600;color:#f9fafb;letter-spacing:.3px}
.tag{background:#1f2937;color:#9ca3af;padding:2px 8px;border-radius:10px;font-size:11px}
#workspace{display:flex;flex:1;overflow:hidden}
#sidebar{width:250px;background:#0e1117;border-right:1px solid #1f2937;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#sidebar-inner{flex:1;overflow-y:auto;padding:14px}
#sidebar-inner::-webkit-scrollbar{width:4px}
#sidebar-inner::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
.s-section{margin-bottom:18px}
.s-section h3{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#6b7280;margin-bottom:8px;font-weight:600}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.preset-btn{background:#1f2937;border:1px solid #374151;color:#d1d5db;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;transition:all .15s;text-align:center}
.preset-btn:hover{background:#374151;color:#f9fafb}
.preset-btn.active{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd}
.layer-row,.conn-row{display:flex;align-items:center;gap:7px;padding:4px 2px;cursor:pointer;border-radius:4px}
.layer-row:hover,.conn-row:hover{background:#1f2937}
.layer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.conn-line-vis{width:20px;height:2px;flex-shrink:0}
.cb{accent-color:#3b82f6;width:13px;height:13px}
.layer-label,.conn-label{color:#d1d5db;font-size:12px}
#comment-list{display:flex;flex-direction:column;gap:6px}
.comment-item{background:#1a1f2a;border:1px solid #1f2937;border-radius:6px;padding:8px 10px;position:relative}
.c-target{font-size:11px;color:#60a5fa;font-weight:600;margin-bottom:3px}
.c-text{font-size:12px;color:#d1d5db;line-height:1.4;word-break:break-word;padding-right:18px}
.comment-del{position:absolute;top:6px;right:8px;background:none;border:none;color:#6b7280;cursor:pointer;font-size:15px;line-height:1;padding:0}
.comment-del:hover{color:#ef4444}
.no-comments{color:#4b5563;font-size:12px;font-style:italic}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#canvas-wrap{flex:1;overflow:hidden;position:relative;background:#0a0c10;cursor:grab}
#canvas-wrap.grabbing{cursor:grabbing}
#svg-el{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible}
#zoom-btns{position:absolute;bottom:12px;right:14px;display:flex;gap:5px;z-index:10}
#zoom-btns button{background:#1f2937;border:1px solid #374151;color:#d1d5db;width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
#zoom-btns button:hover{background:#374151}
#prompt-area{height:130px;border-top:1px solid #1f2937;display:flex;background:#0e1117;flex-shrink:0}
#prompt-text{flex:1;padding:12px 14px;font-size:12px;line-height:1.6;color:#d1d5db;overflow-y:auto;white-space:pre-wrap}
#prompt-text::-webkit-scrollbar{width:4px}
#prompt-text::-webkit-scrollbar-thumb{background:#374151}
#prompt-actions{display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;gap:6px}
#copy-btn{background:#1e3a5f;border:1px solid #3b82f6;color:#93c5fd;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
#copy-btn:hover{background:#2d5a9e}
#copy-feedback{font-size:11px;color:#34d399;text-align:center;height:14px}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
#modal-overlay.visible{display:flex}
#modal-box{background:#161b26;border:1px solid #374151;border-radius:10px;padding:20px;width:430px;max-width:90vw}
#modal-box h3{font-size:14px;font-weight:600;color:#f9fafb;margin-bottom:3px}
.m-subtitle{font-size:11px;color:#60a5fa;margin-bottom:6px;font-family:monospace}
.m-desc{font-size:12px;color:#9ca3af;line-height:1.5;margin-bottom:10px;background:#0e1117;padding:8px 10px;border-radius:6px;border:1px solid #1f2937}
.m-fns{font-size:11px;color:#6b7280;font-family:monospace;margin-bottom:12px;line-height:1.7}
#modal-textarea{width:100%;height:80px;background:#0e1117;border:1px solid #374151;color:#d1d5db;padding:8px;border-radius:6px;font-size:12px;resize:none;outline:none;font-family:inherit}
#modal-textarea:focus{border-color:#3b82f6}
#modal-textarea::placeholder{color:#4b5563}
.modal-btns{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
.modal-btns button{padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px;border:none}
#modal-save{background:#1e3a5f;color:#93c5fd;border:1px solid #3b82f6}
#modal-save:hover{background:#2d5a9e}
#modal-cancel{background:#1f2937;color:#9ca3af;border:1px solid #374151}
#modal-cancel:hover{background:#374151}
.node-g{cursor:pointer}
</style>
</head>
<body>
<div id="topbar">
  <h1>MT5 CLI · Codebase Map</h1>
  <span class="tag">19 modules</span>
  <span class="tag">35 connections</span>
  <span class="tag" style="margin-left:auto;color:#6b7280">Click any node to comment</span>
</div>
<div id="workspace">
  <div id="sidebar">

        <div id="comment-list"></div>
      </div>
    </div>
  </div>
  <div id="main">
    <div id="canvas-wrap">
      <svg id="svg-el" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arr-dep"    markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#4b5563"/></marker>
          <marker id="arr-lazy"   markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#14b8a6"/></marker>
          <marker id="arr-risk"   markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#f97316"/></marker>
          <marker id="arr-bridge" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#ef4444"/></marker>
          <marker id="arr-data"   markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#3b82f6"/></marker>
        </defs>
        <g id="diagram-g"></g>
      </svg>
      <div id="zoom-btns">
        <button onclick="doZoom(1.2)">+</button>
        <button onclick="doZoom(0.83)">−</button>
        <button onclick="resetView()">⌂</button>
      </div>
    </div>
    <div id="prompt-area">
      <div id="prompt-text"></div>
      <div id="prompt-actions">
        <button id="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
        <div id="copy-feedback"></div>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <h3 id="modal-title"></h3>
    <div class="m-subtitle" id="modal-subtitle"></div>
    <div class="m-desc" id="modal-desc"></div>
    <div class="m-fns" id="modal-fns"></div>
    <textarea id="modal-textarea" placeholder="Add a comment, question, or note about this component…"></textarea>
    <div class="modal-btns">
      <button id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button id="modal-save" onclick="saveComment()">Save Comment</button>
    </div>
  </div>
</div>

  {id:'indicator',  label:'indicator',   sub:'core/indicator.py',        x:288,y:258,w:118,h:42,layer:'core'},
  {id:'analyze',    label:'analyze',     sub:'core/analyze.py',          x:422,y:258,w:118,h:42,layer:'core'},
  {id:'chart',      label:'chart',       sub:'core/chart.py',            x:556,y:258,w:118,h:42,layer:'core'},
  {id:'screenshot', label:'screenshot',  sub:'core/screenshot.py',       x:690,y:258,w:120,h:42,layer:'core'},
  {id:'tda_manifest',label:'tda_manifest',sub:'core/tda_manifest.py',    x:830,y:258,w:142,h:42,layer:'core'},
  {id:'ehukai',     label:'ehukai',      sub:'core/ehukai.py',           x:980,y:258,w:118,h:42,layer:'core'},
  {id:'mt5_backend',label:'mt5_backend', sub:'utils/mt5_backend.py',     x:345,y:375,w:160,h:48,layer:'bridge'},
  {id:'mt5lib',     label:'MetaTrader5', sub:'python pkg → terminal',    x:350,y:480,w:150,h:42,layer:'external'},
  {id:'conftest',   label:'conftest',    sub:'tests/conftest.py',        x:40, y:575,w:118,h:40,layer:'tests'},
  {id:'test_core',  label:'test_core',   sub:'tests/test_core.py',       x:340,y:575,w:118,h:40,layer:'tests'},
  {id:'test_e2e',   label:'test_e2e',    sub:'tests/test_e2e.py',        x:640,y:575,w:118,h:40,layer:'tests'},

const CONNECTIONS = [
  {f:'mt5_cli',   to:'project',     type:'dependency'},
  {f:'mt5_cli',   to:'account',     type:'dependency'},

  {f:'account',   to:'risk',        type:'risk-chain', label:'daily_loss()'},
  {f:'history',   to:'risk',        type:'risk-chain', label:'resolve_magic()'},
  {f:'indicator', to:'rates',       type:'dependency'},
  {f:'analyze',   to:'indicator',   type:'dependency'},
  {f:'analyze',   to:'rates',       type:'dependency'},
  {f:'screenshot',to:'chart',       type:'lazy'},

  {f:'risk',      to:'mt5_backend', type:'bridge-call'},
  {f:'order',     to:'mt5_backend', type:'bridge-call'},
  {f:'position',  to:'mt5_backend', type:'bridge-call'},
  {f:'history',   to:'mt5_backend', type:'bridge-call'},
  {f:'market',    to:'mt5_backend', type:'bridge-call'},

  {f:'mt5_backend',to:'mt5lib',     type:'data-flow',  label:'mt5_call()'},
  {f:'conftest',  to:'mt5_backend', type:'dependency'},
  {f:'test_core', to:'mt5_backend', type:'dependency'},
  {f:'test_e2e',  to:'account',     type:'dependency'},
  {f:'test_e2e',  to:'order',       type:'dependency'},

const NODE_INFO = {
  mt5_cli:    {desc:'Root Click group. All CLI commands and the dual-mode output() emitter. Composes is_live_intent from 3 conditions: cfg["live"] AND --live flag AND MT5_LIVE=1 env var. Top-level flags (--json, --live) must precede the subcommand.', fns:['main() — invoke_without_command=True launches REPL','output(result, as_json) — dual-mode emitter','_ensure_connected(cfg)','_compose_live_intent(cfg, cli_live)']},
  repl_skin:  {desc:'Interactive REPL via prompt_toolkit. Banner shows server+balance. Tracks last-used symbol in the prompt. Auto-reconnects on both SystemExit(2) (CLI connection convention) and ConnectionError.', fns:['ReplSkin(cfg).run()','_banner() — lazy account.info()','_dispatch(args, mt5_cli) — reconnects on exit-code 2 or ConnectionError']},
  project:    {desc:'4-layer config resolution: DEFAULTS → ~/.config/cli-anything-mt5.json (JSON) → env vars (MT5_LOGIN/PASSWORD/SERVER) → CLI overrides. CONFIG_PATH constant.', fns:['load(overrides=None) → dict','save(cfg)','mask_secrets(cfg)']},
  account:    {desc:'Account snapshot. risk() shows positions_used, daily_loss_used, and safe_to_trade flag. Calls risk.daily_loss() for floating+realized P&L combined.', fns:['info() → envelope — full account snapshot','balance() → subset','risk(cfg) → envelope — safe_to_trade flag']},
  risk:       {desc:'11-gate pre-flight checker. Gates: strategy-id length, live gate (trade_mode==real), symbol allowlist, max lot, SL distance, spread, hedge guard, max positions, free margin (margin_free on Trading.com), daily loss cap, rate limiter (sliding 60s window).', fns:['check_order(..., *, is_live_intent, consume_rate_limit=True)','compute_volume_from_risk_pct(symbol, risk_pct, entry, sl, cfg)','resolve_magic(strategy_id, cfg) → int — 3-tier: config map / SHA-256 / default 88888']},
  order:      {desc:'Market/limit/stop/dryrun placement. Every mutating function has keyword-only is_live_intent. Dryrun calls order_check (NOT order_send). cancel() and cancel_all_pending() also live-gated.', fns:['place_market(..., *, is_live_intent) → envelope','dryrun(...) — risk check + broker order_check, no send','cancel(ticket, *, is_live_intent)','poll_fill(ticket, timeout_ms)']},
  position:   {desc:'Open position management. All mutating functions take keyword-only is_live_intent. close_all() is called by kill-switch. breakeven() moves SL to open_price ± buffer_points.', fns:['list(symbol=None) → envelope','close(ticket, volume=None, *, is_live_intent)','close_all(symbol=None, *, is_live_intent)','breakeven(ticket, buffer_points=0, *, is_live_intent)','move_sl(ticket, sl, *, is_live_intent)']},
  history:    {desc:'Historical orders, deals, and performance stats. Filters by strategy_id via magic number (resolve_magic). ISO-8601 timestamps. stats() computes win_rate, profit_factor, max_drawdown. Requires both --from and --to flags.', fns:['orders(date_from, date_to, symbol, strategy_id, cfg)','deals(...)','stats(...) → win_rate, profit_factor, max_drawdown']},
  market:     {desc:'Symbol info, live tick, Depth of Market, search, and static session table data. depth() is the canonical DOM data primitive: it uses market_book_add/get/release, releases after each one-shot snapshot, and returns nearest-first bids/asks plus spread, midpoint, side volume, and imbalance. Agents use it for execution quality and liquidity context, not as a standalone directional signal. search() requires --pattern flag (not positional).', fns:['info(symbol) → bid/ask/spread/point/filling_mode','tick(symbol) → latest bid/ask/last with ISO timestamp','depth(symbol, levels=0) → DOM bids/asks, spread_points, midpoint, imbalance','search(pattern) → broker-exact symbol names','sessions(symbol) → static UTC market session table']},
  rates:      {desc:'OHLCV bar and tick fetcher. Timeframe string → MT5 constant mapping. latest() returns most-recently-closed bar (start_pos=1). ticks() uses a 24h lookback window.', fns:['fetch(symbol, timeframe, bars) → list of OHLCV dicts','latest(symbol, timeframe) → last closed bar','ticks(symbol, bars) → last N ticks']},
  indicator:  {desc:'EMA and ATR via pandas-ta. fvg() is a pure-Python inline Fair Value Gap zone detection — does NOT use pandas-ta; pure 3-bar window scan. FVG zones include exact lower/upper/mid, state, distance, size_points, size_pips, visual_label, object_prefix EFVG_, and visual_contract EhukaiFVG so JSON pairs with the vendored MT5 overlay.', fns:['ema(symbol, timeframe, period, bars=100)','atr(symbol, timeframe, period=14, bars=100)','fvg(symbol, timeframe, ...) → FVG zones with id/boundaries/state/fill_pct/visual_label','list_available()']},
  analyze:    {desc:'Composite multi-TF market-structure analysis. The ONLY core module with NO direct bridge import — all MT5 access routes through rates. topdown() returns per-TF swing structure bias + confluence_score without indicators. structure() now also emits swing_points with SH/SL/HH/HL/LH/LL visual labels matching EhukaiMarketStructure.', fns:['topdown(symbol, timeframes, bars=200) → per-TF structure bias + confluence_score','structure(symbol, timeframe, bars, pivot_n=5) → swing highs/lows, S/R levels, swing_points visual labels','bias(symbol) → D1/H4/H1 directional shortcut']},
  chart:      {desc:'Win32 chart controls via ctypes/pywin32. current_title() reads the matched MT5 title. ensure_chart() is the broker-agnostic chart-selection primitive agents should use before GUI/screenshot work: it switches the active chart to a broker-exact symbol, optionally leaves a verified timeframe such as M15, and avoids relying on File > New Chart menus. switch_tf() clicks the MT5 toolbar via WM_COMMAND, then polls the title briefly to absorb MT5 repaint lag. symbol() sends keyboard text and verifies the window title. open_depth_of_market() opens the real MT5 Charts > Depth Of Market GUI panel through the terminal menu. close_depth_of_market() first closes true DOM child windows and falls back to menu-toggle when MT5 renders DOM inside the active chart.', fns:['current_title(window_substring) → active title/hwnd','ensure_chart(symbol_name, timeframe="M15") → verified symbol/timeframe','switch_tf(tf, window_substring, settle_seconds)','symbol(symbol_name, window_substring, settle_seconds)','open_depth_of_market(symbol) → opens GUI DOM panel','close_depth_of_market(symbol) → close child or menu-toggle DOM','find_window(window_substring) → WindowMatch|None']},
  screenshot: {desc:'mss + pygetwindow screen capture. tda() does a multi-TF screenshot loop using chart.switch_tf() and restores the active chart to final_timeframe (default M15) after capture so the operator workspace returns to the normal working TF. TDA now attaches a visual_manifest for vendored Ehukai MQ5 overlays plus per-frame structured_context from the Ehukai mirror module, and writes a sibling manifest JSON by default. dom() opens and captures the GUI Depth Of Market panel for visual review, then closes/toggles the DOM panel by default so it does not block the chart. annotate() adds a Pillow text overlay.', fns:['take(output_path, window_substring, monitor, cfg)','tda(symbol, timeframes, output_dir, final_timeframe="M15") → screenshots + visual manifest + Ehukai structured context','dom(symbol, output_dir, open_panel=True, close_panel=True) → GUI DOM screenshot + cleanup','annotate(input_path, output_path, text, xy)']},
  tda_manifest:{desc:'Visual TDA contract for agents. Owns the stable legend for vendored Ehukai MQ5 indicators and marks EhukaiTDAOverlay as the preferred single chart overlay. Primitive overlays remain debug-only so screenshot charts avoid label/rectangle overlap. Composes fail-soft per-frame structured_context from the Ehukai mirror module.', fns:['visual_manifest() → preferred overlay + indicator legend/object contract','frame_context(symbol, timeframe, bars, fvg_limit) → Ehukai structure + FVG + liquidity context']},
  ehukai:     {desc:'Structured mirrors of the vendored Ehukai MT5 visual indicators. This is the preferred data layer for visual TDA: market_structure() follows EhukaiMarketStructure adaptive pivots, BOS labels, MS panel label, and support/resistance semantics; fvg() follows EhukaiFVG lookback, pips labels, max-zone cap, distance filter, and EFVG_ object contract; liquidity() follows EhukaiLiquiditySwings buy-side/sell-side pool labels, count/volume filters, and ELS_ object contract.', fns:['market_structure(symbol, timeframe, bars=300) → EMS_ bias/panel/swings/levels','fvg(symbol, timeframe, bars=100) → EFVG_ visible zones with visual_label','liquidity(symbol, timeframe, length=14) → ELS_ BSL/SSL pools with sweep status','summarize_contexts(frames) → dominant bias + FVG/liquidity counts']},
  mt5_backend:{desc:'THE ONLY FILE THAT IMPORTS MetaTrader5. All MT5 API calls flow through mt5_call() under a threading.Lock. Re-exports all MT5 constants so no other module needs to import MetaTrader5. connect() is idempotent (double-checked locking). reconnect_once() is used by the REPL on disconnect.', fns:['connect(login, password, server, timeout) — idempotent','mt5_call(fn_name, *args, **kwargs) — LOCKED dispatcher','ensure_symbol(symbol) → bool','reconnect_once(cfg) → bool — shutdown + re-initialize']},
  mt5lib:     {desc:'MetaTrader5 Python package. Connects to the MT5 terminal process via a named pipe on Windows. Accessible ONLY through mt5_backend.mt5_call() in this project. Known quirk: mt5.initialize(password=None) raises "Invalid password argument" — must call mt5.initialize() with no args when credentials are absent.', fns:['mt5.initialize() / mt5.shutdown()','mt5.order_send(request)','mt5.symbol_info_tick(symbol)','mt5.market_book_add/get/release(symbol)','mt5.history_deals_get(from, to)']},
  conftest:   {desc:'Pytest fixtures for all unit tests. Patches MetaTrader5 at import time with MagicMock. reset_bridge resets _initialized flag. reset_rate_limiter clears the sliding window deque.', fns:['mt5m fixture — MagicMock MetaTrader5 stub','cfg fixture — demo config dict','reset_bridge fixture','reset_rate_limiter fixture']},
  test_core:  {desc:'Unit tests. All 11 risk gates covered. DOM covers structured market_book subscribe/read/release, GUI menu-open path, screenshot-dom wrapper, level limiting, error paths, and CLI JSON. Chart tests cover current-title/ensure selection plus timeframe verification. REPL reconnect on ConnectionError and SystemExit(2). Kill-switch fail-fast on top-level error. All MT5 calls fully mocked via conftest.', fns:['TestBridge (connect/disconnect/idempotency)','TestMarket (info/tick/search/sessions/depth)','TestChart (current/ensure/timeframe/symbol/menu DOM)','TestScreenshot (take/tda/dom)','TestRisk (all 11 gates)','TestOrder (place/cancel/dryrun/list)','TestPosition (close/breakeven/move-sl)','TestKillSwitch','TestRepl (reconnect, banner)']},
  test_e2e:   {desc:'Integration tests. Skipped unless MT5_DEMO_INTEGRATION=1. Module-level safety guard aborts if trade_mode==real. DOM smoke accepts success or documented broker/symbol unsupported errors. Full round-trip: place 0.01-lot buy → poll fill → close → verify in history.deals.', fns:['test_account_info_returns_balance()','test_rates_and_ema()','test_market_depth_snapshot_when_available()','test_market_order_round_trip() — full demo round-trip']},
};

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  layers:    {cli:true,core:true,bridge:true,utils:true,tests:true,external:true},
  connTypes: {dependency:true,lazy:true,'risk-chain':true,'bridge-call':true,'data-flow':true},
  comments:  [],
  zoom: 1, panX: 30, panY: 20,
  activePreset: 'full',
};

const PRESETS = {
  full:     {layers:{cli:true,core:true,bridge:true,utils:true,tests:true,external:true}, conns:{dependency:true,lazy:true,'risk-chain':true,'bridge-call':true,'data-flow':true}},
  core:     {layers:{cli:true,core:true,bridge:true,utils:true,tests:false,external:false}, conns:{dependency:false,lazy:true,'risk-chain':true,'bridge-call':true,'data-flow':true}},
  risk:     {layers:{cli:false,core:true,bridge:true,utils:false,tests:false,external:false}, conns:{dependency:false,lazy:false,'risk-chain':true,'bridge-call':true,'data-flow':false}},
  analysis: {layers:{cli:false,core:true,bridge:true,utils:false,tests:false,external:true}, conns:{dependency:true,lazy:false,'risk-chain':false,'bridge-call':true,'data-flow':true}},
};

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.id] = n; });

// ── SVG helpers ───────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';

function makeSVG(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function textSVG(x, y, txt, attrs) {
  const el = makeSVG('text', {x, y, ...attrs});
  el.textContent = txt;
  return el;
}

function ncx(n) { return n.x + n.w / 2; }
function ncy(n) { return n.y + n.h / 2; }

function edgePoints(fn, tn) {
  const fdx = ncx(fn), fdy = ncy(fn), tdx = ncx(tn), tdy = ncy(tn);
  const dx = tdx - fdx, dy = tdy - fdy;
  let x1, y1, x2, y2;
  if (Math.abs(dy) > Math.abs(dx) * 0.65) {
    x1 = fdx; y1 = dy > 0 ? fn.y + fn.h : fn.y;
    x2 = tdx; y2 = dy > 0 ? tn.y : tn.y + tn.h;
  } else {
    x1 = dx > 0 ? fn.x + fn.w : fn.x; y1 = fdy;
    x2 = dx > 0 ? tn.x : tn.x + tn.w; y2 = tdy;
  }
  return {x1, y1, x2, y2};
}

function bezier(x1, y1, x2, y2) {
  const ddx = Math.abs(x2-x1), ddy = Math.abs(y2-y1);
  let cx1, cy1, cx2, cy2;
  if (ddy > ddx * 0.65) {
    const off = Math.max(40, ddy * 0.4);
    cx1 = x1; cy1 = y1 + (y2>y1?off:-off);
    cx2 = x2; cy2 = y2 + (y2>y1?-off:off);
  } else {
    const off = Math.max(30, ddx * 0.4);
    cx1 = x1 + (x2>x1?off:-off); cy1 = y1;
    cx2 = x2 + (x2>x1?-off:off); cy2 = y2;
  }
  return 'M '+x1+' '+y1+' C '+cx1+' '+cy1+' '+cx2+' '+cy2+' '+x2+' '+y2;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const g = document.getElementById('diagram-g');
  while (g.firstChild) g.removeChild(g.firstChild);
  g.setAttribute('transform', 'translate('+state.panX+','+state.panY+') scale('+state.zoom+')');

  const visNodes = new Set(NODES.filter(n => state.layers[n.layer]).map(n => n.id));
  const commentedIds = new Set(state.comments.map(c => c.target));

  // Layer bands
  const bands = [
    {label:'CLI / Utils', y:20,  h:65,  fill:'#3b82f608'},
    {label:'Core',        y:135, h:185, fill:'#22c55e06'},
    {label:'Bridge',      y:360, h:78,  fill:'#ef444408'},
    {label:'External',    y:465, h:70,  fill:'#6b728006'},
    {label:'Tests',       y:560, h:68,  fill:'#eab30806'},
  ];
  bands.forEach(b => {
    g.appendChild(makeSVG('rect', {x:0, y:b.y, width:870, height:b.h, fill:b.fill, rx:6}));
    g.appendChild(textSVG(860, b.y+14, b.label, {'text-anchor':'end', fill:'#374151', 'font-size':'10', 'font-family':'system-ui,sans-serif'}));
  });

  // Connections
  CONNECTIONS.forEach(c => {
    const fn = nodeMap[c.f], tn = nodeMap[c.to];
    if (!fn||!tn||!visNodes.has(c.f)||!visNodes.has(c.to)||!state.connTypes[c.type]) return;
    const ct = CONN_TYPES[c.type];
    const {x1,y1,x2,y2} = edgePoints(fn, tn);
    const pathAttrs = {d:bezier(x1,y1,x2,y2), fill:'none', stroke:ct.color, 'stroke-width':'1.5', 'stroke-opacity':'0.5', 'marker-end':'url(#'+ct.marker+')'};
    if (ct.dash) pathAttrs['stroke-dasharray'] = ct.dash;
    g.appendChild(makeSVG('path', pathAttrs));
    if (c.label) {
      const mx = (x1+x2)/2, my = (y1+y2)/2;
      g.appendChild(textSVG(mx, my-5, c.label, {'text-anchor':'middle', fill:ct.color, 'font-size':'9', 'font-family':'monospace', opacity:'0.85'}));
    }
  });

  // Nodes
  NODES.forEach(n => {
    if (!visNodes.has(n.id)) return;
    const lc = LAYERS[n.layer];
    const commented = commentedIds.has(n.id);
    const grp = makeSVG('g', {'data-id':n.id});
    grp.style.cursor = 'pointer';

    if (n.layer === 'bridge') {
      grp.appendChild(makeSVG('rect', {x:n.x-4, y:n.y-4, width:n.w+8, height:n.h+8, rx:10, fill:'#ef444415'}));
    }

    grp.appendChild(makeSVG('rect', {x:n.x, y:n.y, width:n.w, height:n.h, rx:7, fill:'#161b26', stroke:lc.color, 'stroke-width': commented?'2.5':'1.5', 'stroke-opacity':'0.85'}));

    if (commented) {
      grp.appendChild(makeSVG('circle', {cx:n.x+n.w-6, cy:n.y+6, r:5, fill:'#f59e0b'}));
    }

    grp.appendChild(textSVG(ncx(n), n.y+n.h*0.4, n.label, {'text-anchor':'middle', 'dominant-baseline':'middle', fill:lc.color, 'font-size': n.layer==='bridge'?'13':'12', 'font-weight':'600', 'font-family':'monospace', 'pointer-events':'none'}));
    grp.appendChild(textSVG(ncx(n), n.y+n.h*0.72, n.sub, {'text-anchor':'middle', 'dominant-baseline':'middle', fill:'#4b5563', 'font-size':'9', 'font-family':'monospace', 'pointer-events':'none'}));

    grp.addEventListener('click', () => openModal(n.id));
    g.appendChild(grp);
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
let activeNodeId = null;

function openModal(id) {
  const n = nodeMap[id];
  const info = NODE_INFO[id] || {desc:'', fns:[]};
  activeNodeId = id;
  document.getElementById('modal-title').textContent = n.label;
  document.getElementById('modal-subtitle').textContent = n.sub;
  document.getElementById('modal-desc').textContent = info.desc;

  const fnsEl = document.getElementById('modal-fns');
  while (fnsEl.firstChild) fnsEl.removeChild(fnsEl.firstChild);
  info.fns.forEach(f => {
    const d = document.createElement('div');
    d.textContent = '• ' + f;
    fnsEl.appendChild(d);
  });

  const existing = state.comments.find(c => c.target === id);
  document.getElementById('modal-textarea').value = existing ? existing.text : '';
  document.getElementById('modal-overlay').classList.add('visible');
  setTimeout(() => document.getElementById('modal-textarea').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
  activeNodeId = null;
}

function saveComment() {
  const text = document.getElementById('modal-textarea').value.trim();
  if (!text) { closeModal(); return; }
  const n = nodeMap[activeNodeId];
  state.comments = state.comments.filter(c => c.target !== activeNodeId);
  state.comments.push({id:Date.now(), target:activeNodeId, label:n.label, sub:n.sub, text});
  closeModal();
  renderComments();
  render();
  updatePrompt();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ── Comments sidebar ──────────────────────────────────────────────────────────
function deleteComment(id) {
  state.comments = state.comments.filter(c => c.id !== id);
  renderComments(); render(); updatePrompt();
}

function renderComments() {
  const list = document.getElementById('comment-list');
  document.getElementById('comment-count').textContent = String(state.comments.length);
  while (list.firstChild) list.removeChild(list.firstChild);
  if (!state.comments.length) {
    const p = document.createElement('p');
    p.className = 'no-comments';
    p.textContent = 'Click nodes to add comments';
    list.appendChild(p);
    return;
  }
  state.comments.forEach(c => {
    const item = document.createElement('div');
    item.className = 'comment-item';

    const tgt = document.createElement('div');
    tgt.className = 'c-target';
    tgt.textContent = c.label;
    item.appendChild(tgt);

    const txt = document.createElement('div');
    txt.className = 'c-text';
    txt.textContent = c.text;
    item.appendChild(txt);

    const del = document.createElement('button');
    del.className = 'comment-del';
    del.textContent = '×';
    del.setAttribute('aria-label', 'Delete comment');
    del.addEventListener('click', () => deleteComment(c.id));
    item.appendChild(del);

    list.appendChild(item);
  });
}

// ── Prompt output ─────────────────────────────────────────────────────────────
function updatePrompt() {
  const visLayers  = Object.entries(state.layers).filter(([,v])=>v).map(([k])=>LAYERS[k].label);
  const hidLayers  = Object.entries(state.layers).filter(([,v])=>!v).map(([k])=>LAYERS[k].label);
  const activeConns = Object.entries(state.connTypes).filter(([,v])=>v).map(([k])=>CONN_TYPES[k].label);
  const hidConns    = Object.entries(state.connTypes).filter(([,v])=>!v).map(([k])=>CONN_TYPES[k].label);

  const parts = ['This is the MT5 CLI codebase architecture — a 3-tier MetaTrader5 trading CLI.'];
  if (hidLayers.length) parts.push('Currently showing: '+visLayers.join(', ')+' (hiding: '+hidLayers.join(', ')+').');
  if (hidConns.length)  parts.push('Showing connections: '+activeConns.join(', ')+'.');

  if (state.comments.length) {
    parts.push('\nFeedback on specific components:\n');
    state.comments.forEach(c => {
      parts.push('**'+c.label+'** ('+c.sub+'):');
      parts.push(c.text);
      parts.push('');
    });
  } else {
    parts.push('\nClick any module node to annotate it. Annotations appear here as a copyable prompt.');
  }

  document.getElementById('prompt-text').textContent = parts.join('\n');
}

function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('prompt-text').textContent).then(() => {
    const fb = document.getElementById('copy-feedback');
    fb.textContent = 'Copied!';
    setTimeout(() => { fb.textContent = ''; }, 1500);
  });
}

// ── Controls ──────────────────────────────────────────────────────────────────
function applyPreset(name) {
  state.activePreset = name;
  const p = PRESETS[name];
  Object.assign(state.layers, p.layers);
  Object.assign(state.connTypes, p.conns);
  buildControls();
  render();
  updatePrompt();
}

function toggleLayer(key, val) {
  state.layers[key] = val;
  state.activePreset = '';
  syncPresetButtons();
  render(); updatePrompt();
}

function toggleConn(key, val) {
  state.connTypes[key] = val;
  state.activePreset = '';
  syncPresetButtons();
  render(); updatePrompt();
}

function syncPresetButtons() {
  document.querySelectorAll('.preset-btn').forEach(b => {
    const n = b.getAttribute('data-preset');
    b.classList.toggle('active', n === state.activePreset);
  });
}

function buildControls() {
  // Preset buttons
  const pb = document.getElementById('preset-btns');
  while (pb.firstChild) pb.removeChild(pb.firstChild);
  [['full','Full System'],['core','Core Flow'],['risk','Risk Chain'],['analysis','Analysis']].forEach(([k,lab]) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (state.activePreset===k?' active':'');
    btn.setAttribute('data-preset', k);
    btn.textContent = lab;
    btn.addEventListener('click', () => applyPreset(k));
    pb.appendChild(btn);
  });

  // Layer checkboxes
  const lc = document.getElementById('layer-controls');
  while (lc.firstChild) lc.removeChild(lc.firstChild);
  Object.entries(LAYERS).forEach(([key, lay]) => {
    const label = document.createElement('label');
    label.className = 'layer-row';

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'cb'; cb.checked = !!state.layers[key];
    cb.addEventListener('change', () => toggleLayer(key, cb.checked));

    const dot = document.createElement('span');
    dot.className = 'layer-dot';
    dot.style.background = lay.color;

    const lbl = document.createElement('span');
    lbl.className = 'layer-label';
    lbl.textContent = lay.label;

    label.appendChild(cb); label.appendChild(dot); label.appendChild(lbl);
    lc.appendChild(label);
  });

  // Connection type checkboxes
  const cc = document.getElementById('conn-controls');
  while (cc.firstChild) cc.removeChild(cc.firstChild);
  Object.entries(CONN_TYPES).forEach(([key, ct]) => {
    const label = document.createElement('label');
    label.className = 'conn-row';

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'cb'; cb.checked = !!state.connTypes[key];
    cb.addEventListener('change', () => toggleConn(key, cb.checked));

    const line = document.createElement('span');
    line.className = 'conn-line-vis';
    line.style.background = ct.dash ? 'none' : ct.color;
    if (ct.dash) {
      line.style.borderTop = '2px dashed ' + ct.color;
      line.style.marginTop = '5px';
    }

    const lbl = document.createElement('span');
    lbl.className = 'conn-label';
    lbl.textContent = ct.label;

    label.appendChild(cb); label.appendChild(line); label.appendChild(lbl);
    cc.appendChild(label);
  });
}

// ── Zoom / Pan ────────────────────────────────────────────────────────────────
function doZoom(f) {
  state.zoom = Math.min(3, Math.max(0.25, state.zoom * f));
  render();
}
function resetView() {
  state.zoom = 1; state.panX = 30; state.panY = 20; render();
}

const wrap = document.getElementById('canvas-wrap');
let drag = false, dsx, dsy, psx, psy;
wrap.addEventListener('mousedown', e => {
  if (e.target.closest('[data-id]')) return;
  drag=true; dsx=e.clientX; dsy=e.clientY; psx=state.panX; psy=state.panY;
  wrap.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  state.panX = psx+(e.clientX-dsx); state.panY = psy+(e.clientY-dsy);
  document.getElementById('diagram-g').setAttribute('transform','translate('+state.panX+','+state.panY+') scale('+state.zoom+')');
});
window.addEventListener('mouseup', () => { drag=false; wrap.classList.remove('grabbing'); });
wrap.addEventListener('wheel', e => { e.preventDefault(); doZoom(e.deltaY<0?1.1:0.91); }, {passive:false});

// ── Init ──────────────────────────────────────────────────────────────────────
buildControls();
render();
renderComments();
updatePrompt();
</script>
</body>
</html>
